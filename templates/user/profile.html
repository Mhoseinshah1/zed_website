{{template "user" .}}
{{define "user-content"}}
<div class="max-w-2xl space-y-6">
  <div class="u-card p-6">
    <h2 class="text-sm font-bold mb-6 text-white">اطلاعات شخصی</h2>
    <form method="POST" action="/user/profile" class="space-y-4">
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="u-label">نام</label>
          <input type="text" name="first_name" class="u-input" placeholder="نام"
                 value="{{if .User.Profile}}{{.User.Profile.FirstName}}{{end}}">
        </div>
        <div>
          <label class="u-label">نام خانوادگی</label>
          <input type="text" name="last_name" class="u-input" placeholder="نام خانوادگی"
                 value="{{if .User.Profile}}{{.User.Profile.LastName}}{{end}}">
        </div>
      </div>
      <div>
        <label class="u-label">نام نمایشی</label>
        <input type="text" name="display_name" class="u-input" placeholder="نامی که دوست دارید نمایش داده شود"
               value="{{if .User.Profile}}{{.User.Profile.DisplayName}}{{end}}">
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="u-label">ایمیل</label>
          <input type="email" name="email" class="u-input" placeholder="example@email.com"
                 value="{{.User.DisplayEmail}}">
        </div>
        <div>
          <label class="u-label">شماره موبایل</label>
          <input type="tel" name="phone" class="u-input" placeholder="09XXXXXXXXX"
                 value="{{.User.DisplayPhone}}">
        </div>
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="u-label">منطقه زمانی</label>
          <select name="timezone" class="u-input">
            <option value="Asia/Tehran" {{if .User.Profile}}{{if eq .User.Profile.Timezone "Asia/Tehran"}}selected{{end}}{{end}}>تهران (UTC+3:30)</option>
            <option value="UTC" {{if .User.Profile}}{{if eq .User.Profile.Timezone "UTC"}}selected{{end}}{{end}}>UTC</option>
            <option value="Europe/London" {{if .User.Profile}}{{if eq .User.Profile.Timezone "Europe/London"}}selected{{end}}{{end}}>لندن</option>
            <option value="America/New_York" {{if .User.Profile}}{{if eq .User.Profile.Timezone "America/New_York"}}selected{{end}}{{end}}>نیویورک</option>
            <option value="America/Los_Angeles" {{if .User.Profile}}{{if eq .User.Profile.Timezone "America/Los_Angeles"}}selected{{end}}{{end}}>لس آنجلس</option>
            <option value="Europe/Berlin" {{if .User.Profile}}{{if eq .User.Profile.Timezone "Europe/Berlin"}}selected{{end}}{{end}}>برلین</option>
            <option value="Asia/Dubai" {{if .User.Profile}}{{if eq .User.Profile.Timezone "Asia/Dubai"}}selected{{end}}{{end}}>دبی (UTC+4)</option>
          </select>
        </div>
        <div>
          <label class="u-label">کشور</label>
          <input type="text" name="country" class="u-input" placeholder="ایران"
                 value="{{if .User.Profile}}{{.User.Profile.Country}}{{end}}">
        </div>
      </div>
      <div>
        <label class="u-label">دستگاه اصلی</label>
        <select name="primary_device" class="u-input">
          <option value="">انتخاب کنید</option>
          {{$dev := ""}}{{if .User.Profile}}{{$dev = .User.Profile.PrimaryDevice}}{{end}}
          <option value="Android" {{if eq $dev "Android"}}selected{{end}}>اندروید</option>
          <option value="iPhone / iOS" {{if eq $dev "iPhone / iOS"}}selected{{end}}>آیفون / iOS</option>
          <option value="Windows" {{if eq $dev "Windows"}}selected{{end}}>ویندوز</option>
          <option value="Mac" {{if eq $dev "Mac"}}selected{{end}}>مک</option>
          <option value="Linux" {{if eq $dev "Linux"}}selected{{end}}>لینوکس</option>
        </select>
      </div>
      <div>
        <label class="u-label">نوع استفاده</label>
        <select name="usage_type" class="u-input">
          <option value="">انتخاب کنید</option>
          {{$ut := ""}}{{if .User.Profile}}{{$ut = .User.Profile.UsageType}}{{end}}
          <option value="personal" {{if eq $ut "personal"}}selected{{end}}>شخصی</option>
          <option value="business" {{if eq $ut "business"}}selected{{end}}>کسب‌وکار</option>
          <option value="developer" {{if eq $ut "developer"}}selected{{end}}>توسعه‌دهنده</option>
        </select>
      </div>
      <div class="pt-2">
        <button type="submit" class="btn-primary">ذخیره تغییرات</button>
      </div>
    </form>
  </div>
</div>
{{end}}
