{{template "user" .}}
{{define "user-content"}}
<div class="max-w-2xl space-y-6">
  <!-- Change password -->
  <div class="u-card p-6">
    <h2 class="text-sm font-bold mb-5 text-white">تغییر رمز عبور</h2>
    <form method="POST" action="/user/security/change-password" class="space-y-4">
      <div>
        <label class="u-label">رمز عبور فعلی</label>
        <div class="relative">
          <input type="password" name="current_password" id="sec-pw0" required class="u-input" placeholder="••••••••" style="padding-left:2.5rem">
          <button type="button" onclick="togglePw('sec-pw0',this)" aria-label="نمایش رمز عبور" style="position:absolute;left:0.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;padding:0.2rem">
            <svg class="eye-show" style="width:1.1rem;height:1.1rem" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg class="eye-hide" style="width:1.1rem;height:1.1rem;display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
        </div>
      </div>
      <div>
        <label class="u-label">رمز عبور جدید</label>
        <div class="relative">
          <input type="password" name="new_password" id="sec-pw1" required class="u-input" placeholder="حداقل ۸ کاراکتر" style="padding-left:2.5rem">
          <button type="button" onclick="togglePw('sec-pw1',this)" aria-label="نمایش رمز عبور" style="position:absolute;left:0.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;padding:0.2rem">
            <svg class="eye-show" style="width:1.1rem;height:1.1rem" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg class="eye-hide" style="width:1.1rem;height:1.1rem;display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
        </div>
      </div>
      <div>
        <label class="u-label">تکرار رمز عبور جدید</label>
        <div class="relative">
          <input type="password" name="confirm_password" id="sec-pw2" required class="u-input" placeholder="••••••••" style="padding-left:2.5rem">
          <button type="button" onclick="togglePw('sec-pw2',this)" aria-label="نمایش رمز عبور" style="position:absolute;left:0.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;padding:0.2rem">
            <svg class="eye-show" style="width:1.1rem;height:1.1rem" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg class="eye-hide" style="width:1.1rem;height:1.1rem;display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary text-sm">تغییر رمز عبور</button>
    </form>
    <script>
    function togglePw(id, btn) {
      var inp = document.getElementById(id);
      var show = btn.querySelector('.eye-show');
      var hide = btn.querySelector('.eye-hide');
      if (inp.type === 'password') {
        inp.type = 'text';
        show.style.display = 'none';
        hide.style.display = '';
        btn.setAttribute('aria-label', 'مخفی کردن رمز عبور');
      } else {
        inp.type = 'password';
        show.style.display = '';
        hide.style.display = 'none';
        btn.setAttribute('aria-label', 'نمایش رمز عبور');
      }
    }
    </script>
  </div>

  <!-- Sessions -->
  <div class="u-card p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-bold text-white">خروج از همه دستگاه‌ها</h2>
    </div>
    <p class="text-sm mb-4" style="color:var(--u-muted)">با این عملیات از تمام دستگاه‌های دیگری که وارد سیستم شده‌اید خارج می‌شوید.</p>
    <form method="POST" action="/user/security/logout-all" onsubmit="return confirm('آیا مطمئنید؟')">
      <button type="submit" class="btn-danger text-sm">خروج از همه دستگاه‌ها</button>
    </form>
  </div>

  <!-- Activity logs -->
  {{if .Logs}}
  <div class="u-card overflow-hidden">
    <div class="px-5 py-4" style="border-bottom:1px solid var(--u-border)">
      <h2 class="text-sm font-bold text-white">فعالیت‌های اخیر</h2>
    </div>
    <div class="divide-y" style="divide-color:rgba(255,255,255,0.05)">
      {{range .Logs}}
      <div class="px-5 py-3 flex items-center justify-between text-sm">
        <div>
          <p class="text-white font-medium text-xs">{{.Description}}</p>
          <p class="text-xs mt-0.5" style="color:var(--u-muted)">{{.Action}}</p>
        </div>
        <span class="text-xs flex-shrink-0 mr-4" style="color:var(--u-muted)">{{formatTime .CreatedAt}}</span>
      </div>
      {{end}}
    </div>
  </div>
  {{end}}
</div>
{{end}}
