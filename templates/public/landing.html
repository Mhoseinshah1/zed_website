{{template "base" .}}
{{define "head"}}
<title>{{.Page.Title}}</title>
<meta name="description" content="{{.Page.MetaDescription}}">
{{if .Page.Keywords}}<meta name="keywords" content="{{.Page.Keywords}}">{{end}}
<link rel="canonical" href="{{.SiteURL}}/l/{{.Page.Slug}}">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebPage","name":"{{.Page.Title}}","description":"{{.Page.MetaDescription}}","url":"{{.SiteURL}}/l/{{.Page.Slug}}"}
</script>
{{end}}
{{define "content"}}
<div class="max-w-3xl mx-auto px-4 py-16">
  <h1 class="text-4xl font-black text-white mb-8 leading-tight">{{.Page.H1}}</h1>
  <div class="prose prose-invert max-w-none text-gray-300 leading-relaxed space-y-4">
    {{.BodyHTML}}
  </div>
  <div class="mt-12 text-center">
    <a href="/track?page=landing&source={{.Page.Slug}}&plan=cta" target="_blank" rel="noopener"
       class="inline-flex items-center gap-3 px-8 py-4 rounded-2xl text-white text-lg font-bold transition-all hover:scale-105"
       style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">
      خرید اشتراک ZedProxy
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.26 13.947l-2.95-.924c-.64-.203-.658-.64.136-.954l11.57-4.461c.537-.194 1.006.131.878.613z"/></svg>
    </a>
  </div>
</div>
{{end}}
