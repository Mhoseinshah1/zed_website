{{define "content"}}
<div class="pt-24 pb-20 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h1 class="text-4xl sm:text-5xl font-black text-white mb-4">سوالات متداول</h1>
      <p class="text-gray-400 text-xl max-w-2xl mx-auto">پاسخ به رایج‌ترین سوالات کاربران ZedProxy</p>
    </div>

    {{if .FAQs}}
    <div class="space-y-4" x-data="{open: null}">
      {{range $i, $faq := .FAQs}}
      <div class="glass rounded-xl overflow-hidden">
        <button @click="open = open === {{$i}} ? null : {{$i}}"
                class="w-full flex items-center justify-between p-5 text-right hover:bg-white/5 transition-colors">
          <span class="font-bold text-white text-lg pr-2">{{$faq.Question}}</span>
          <svg :class="open === {{$i}} ? 'rotate-180' : ''"
               class="w-5 h-5 text-gray-400 flex-shrink-0 transition-transform ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div x-show="open === {{$i}}" x-transition.opacity class="px-5 pb-5 border-t border-white/5">
          <p class="text-gray-400 leading-relaxed pt-4">{{$faq.Answer}}</p>
        </div>
      </div>
      {{end}}
    </div>
    {{else}}
    <div class="glass rounded-2xl p-12 text-center">
      <p class="text-gray-400">سوالی برای نمایش وجود ندارد</p>
    </div>
    {{end}}

    <!-- Contact CTA -->
    <div class="mt-16 glass rounded-2xl p-8 text-center">
      <h2 class="text-2xl font-black text-white mb-2">سوال دیگری دارید؟</h2>
      <p class="text-gray-400 mb-6">تیم پشتیبانی ما آماده پاسخگویی است</p>
      <a href="{{index .Settings "telegram_support"}}" target="_blank" rel="noopener"
         class="btn-primary inline-flex items-center gap-3 px-8 py-3 rounded-xl text-white font-bold">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.94z"/></svg>
        ارتباط با پشتیبانی
      </a>
    </div>
  </div>
</div>
{{end}}
