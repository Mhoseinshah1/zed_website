{{define "admin-content"}}
<div class="flex justify-between items-center mb-6">
  <h2 class="text-white font-bold">ویژگی‌ها</h2>
  <a href="/zed-admin/features/new" class="btn-save px-5 py-2 inline-flex items-center gap-2 text-sm">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    ویژگی جدید
  </a>
</div>
<div class="admin-card overflow-hidden">
  <table class="data-table w-full">
    <thead><tr><th>آیکون</th><th>عنوان</th><th>توضیح</th><th>ترتیب</th><th>وضعیت</th><th>عملیات</th></tr></thead>
    <tbody>
      {{range .Features}}
      <tr>
        <td class="text-2xl">{{.Icon}}</td>
        <td class="text-white font-medium">{{.Title}}</td>
        <td class="text-gray-400 text-sm max-w-xs truncate">{{.Description}}</td>
        <td class="text-gray-400">{{.SortOrder}}</td>
        <td>{{if .IsActive}}<span class="badge badge-green">فعال</span>{{else}}<span class="badge badge-red">غیرفعال</span>{{end}}</td>
        <td>
          <div class="flex gap-2">
            <a href="/zed-admin/features/{{.ID}}/edit" class="btn-edit">ویرایش</a>
            <form method="POST" action="/zed-admin/features/{{.ID}}/delete" onsubmit="return confirm('حذف شود؟')">
              <button type="submit" class="btn-danger">حذف</button>
            </form>
          </div>
        </td>
      </tr>
      {{else}}<tr><td colspan="6" class="text-center text-gray-500 py-8">ویژگی‌ای وجود ندارد</td></tr>{{end}}
    </tbody>
  </table>
</div>
{{end}}
