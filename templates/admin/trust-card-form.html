{{define "admin-content"}}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="/zed-admin/trust-cards" class="text-gray-400 hover:text-white">← برگشت</a>
    <h1 class="text-xl font-bold text-white">{{.Title}}</h1>
  </div>
  {{if .Error}}<div class="bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-xl mb-4">{{.Error}}</div>{{end}}
  <form method="POST" action="/zed-admin/trust-cards/save" class="admin-card p-6 space-y-5">
    {{if .Card}}<input type="hidden" name="id" value="{{.Card.ID}}">{{end}}
    <div>
      <label class="form-label">آیکون (ایموجی)</label>
      <input type="text" name="icon" class="form-input" placeholder="👥" value="{{if .Card}}{{.Card.Icon}}{{end}}">
    </div>
    <div>
      <label class="form-label">عنوان *</label>
      <input type="text" name="title" class="form-input" required value="{{if .Card}}{{.Card.Title}}{{end}}">
    </div>
    <div>
      <label class="form-label">توضیح *</label>
      <textarea name="description" class="form-input" rows="3" required>{{if .Card}}{{.Card.Description}}{{end}}</textarea>
    </div>
    <div>
      <label class="form-label">ترتیب</label>
      <input type="number" name="sort_order" class="form-input" value="{{if .Card}}{{.Card.SortOrder}}{{else}}0{{end}}">
    </div>
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="is_active" value="1" {{if not .Card}}checked{{else if .Card.IsActive}}checked{{end}}> فعال
    </label>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
</div>
{{end}}
