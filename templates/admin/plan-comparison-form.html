{{define "admin-content"}}
<div class="max-w-2xl">
  <div class="flex items-center gap-3 mb-6">
    <a href="/zed-admin/plan-comparison" class="text-gray-400 hover:text-white">← برگشت</a>
    <h1 class="text-xl font-bold text-white">{{.Title}}</h1>
  </div>
  {{if .Error}}<div class="bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-xl mb-4">{{.Error}}</div>{{end}}
  <form method="POST" action="/zed-admin/plan-comparison/save" class="admin-card p-6 space-y-5">
    {{if .Comparison}}<input type="hidden" name="id" value="{{.Comparison.ID}}">{{end}}
    <div>
      <label class="form-label">نام ویژگی *</label>
      <input type="text" name="feature_name" class="form-input" required value="{{if .Comparison}}{{.Comparison.FeatureName}}{{end}}">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">مقدار برنز</label>
        <input type="text" name="bronze_value" class="form-input" value="{{if .Comparison}}{{.Comparison.BronzeValue}}{{end}}">
      </div>
      <div>
        <label class="form-label">مقدار نقره</label>
        <input type="text" name="silver_value" class="form-input" value="{{if .Comparison}}{{.Comparison.SilverValue}}{{end}}">
      </div>
      <div>
        <label class="form-label">مقدار طلا</label>
        <input type="text" name="gold_value" class="form-input" value="{{if .Comparison}}{{.Comparison.GoldValue}}{{end}}">
      </div>
      <div>
        <label class="form-label">مقدار پلاتینیوم</label>
        <input type="text" name="platinum_value" class="form-input" value="{{if .Comparison}}{{.Comparison.PlatinumValue}}{{end}}">
      </div>
    </div>
    <div>
      <label class="form-label">ترتیب</label>
      <input type="number" name="sort_order" class="form-input" value="{{if .Comparison}}{{.Comparison.SortOrder}}{{else}}0{{end}}">
    </div>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
</div>
{{end}}
