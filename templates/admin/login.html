{{define "login"}}<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود - پنل مدیریت ZedProxy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Vazirmatn','sans-serif']}}}}</script>
  <style>* { font-family: 'Vazirmatn', sans-serif; } body { background: #0a0a0f; }</style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
      <span class="text-3xl font-black" style="background:linear-gradient(135deg,#6366f1,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">ZedProxy</span>
      <p class="text-gray-500 text-sm mt-1">پنل مدیریت</p>
    </div>

    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)" class="rounded-2xl p-8">
      <h1 class="text-xl font-bold text-white mb-6 text-center">ورود به پنل</h1>

      {{if .Error}}
      <div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl p-4 mb-6 text-sm">
        نام کاربری یا رمز عبور اشتباه است
      </div>
      {{end}}

      <form method="POST" action="/zed-admin/login" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-300 mb-2">نام کاربری</label>
          <input type="text" name="username" required autocomplete="username"
                 style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:white;border-radius:0.5rem;padding:0.7rem 1rem;width:100%;outline:none"
                 class="focus:border-indigo-500 transition-colors"
                 placeholder="نام کاربری خود را وارد کنید">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-300 mb-2">رمز عبور</label>
          <input type="password" name="password" required autocomplete="current-password"
                 style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:white;border-radius:0.5rem;padding:0.7rem 1rem;width:100%;outline:none"
                 class="focus:border-indigo-500 transition-colors"
                 placeholder="رمز عبور خود را وارد کنید">
        </div>
        <button type="submit"
                style="background:linear-gradient(135deg,#6366f1,#8b5cf6)"
                class="w-full py-3 rounded-xl text-white font-bold text-base hover:opacity-90 transition-opacity">
          ورود به پنل
        </button>
      </form>
    </div>

    <p class="text-center text-gray-600 text-xs mt-6">
      <a href="/" class="hover:text-gray-400 transition-colors">بازگشت به سایت</a>
    </p>
  </div>
</body>
</html>
{{end}}
