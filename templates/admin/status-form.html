{{define "admin-content"}}
<div class="mb-6"><a href="/zed-admin/status" class="text-gray-400 hover:text-white text-sm flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>بازگشت</a></div>
{{if .Error}}<div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl p-4 mb-6 text-sm">{{.Error}}</div>{{end}}
<form method="POST" action="/zed-admin/status/save" class="admin-card p-6 space-y-5">
  <input type="hidden" name="id" value="{{if .Update}}{{.Update.ID}}{{end}}">
  <div>
    <label class="form-label">عنوان *</label>
    <input type="text" name="title" required value="{{if .Update}}{{.Update.Title}}{{end}}" class="form-input">
  </div>
  <div>
    <label class="form-label">محتوا *</label>
    <textarea name="content" required class="form-input" rows="5">{{if .Update}}{{.Update.Content}}{{end}}</textarea>
  </div>
  <div>
    <label class="form-label">نوع اطلاعیه</label>
    <select name="status" class="form-input">
      <option value="info" {{if .Update}}{{if eq .Update.Status "info"}}selected{{end}}{{end}}>اطلاع‌رسانی (آبی)</option>
      <option value="success" {{if .Update}}{{if eq .Update.Status "success"}}selected{{end}}{{end}}>موفق (سبز)</option>
      <option value="warning" {{if .Update}}{{if eq .Update.Status "warning"}}selected{{end}}{{end}}>هشدار (زرد)</option>
      <option value="error" {{if .Update}}{{if eq .Update.Status "error"}}selected{{end}}{{end}}>خطا (قرمز)</option>
    </select>
  </div>
  <div class="flex gap-3">
    <button type="submit" class="btn-save px-8 py-2.5">ذخیره</button>
    <a href="/zed-admin/status" class="px-6 py-2.5 rounded-lg text-gray-400 text-sm font-medium border border-white/10">انصراف</a>
  </div>
</form>
{{end}}
