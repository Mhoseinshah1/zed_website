{{define "admin-content"}}
<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-bold text-white">لاگ‌های سیستم</h1>
    <a href="/zed-admin/system/health" class="btn-secondary text-sm">سلامت سیستم</a>
  </div>
  <div class="admin-card overflow-x-auto">
    <table class="w-full text-sm text-right">
      <thead class="text-gray-400 border-b border-white/10">
        <tr>
          <th class="p-3">#</th>
          <th class="p-3">ادمین</th>
          <th class="p-3">عملیات</th>
          <th class="p-3">جزئیات</th>
          <th class="p-3">زمان</th>
        </tr>
      </thead>
      <tbody>
        {{range .Logs}}
        <tr class="border-b border-white/5 hover:bg-white/5">
          <td class="p-3 text-gray-500">{{.ID}}</td>
          <td class="p-3 text-cyan-400">{{.AdminUsername}}</td>
          <td class="p-3 text-white">{{.Action}}</td>
          <td class="p-3 text-gray-400 text-xs">{{.Details}}</td>
          <td class="p-3 text-gray-500 text-xs">{{.CreatedAt.Format "2006-01-02 15:04"}}</td>
        </tr>
        {{else}}
        <tr><td colspan="5" class="p-8 text-center text-gray-500">لاگی یافت نشد</td></tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
{{end}}
