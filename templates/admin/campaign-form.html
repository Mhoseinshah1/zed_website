{{define "admin-content"}}
<div class="max-w-2xl">
  <div class="flex items-center gap-3 mb-6">
    <a href="/zed-admin/campaigns" class="text-gray-400 hover:text-white">← برگشت</a>
    <h1 class="text-xl font-bold text-white">{{.Title}}</h1>
  </div>
  {{if .Error}}<div class="bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-xl mb-4">{{.Error}}</div>{{end}}
  <form method="POST" action="/zed-admin/campaigns/save" class="admin-card p-6 space-y-5">
    {{if .Campaign}}<input type="hidden" name="id" value="{{.Campaign.ID}}">{{end}}
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">اسلاگ (URL) *</label>
        <input type="text" name="slug" class="form-input font-mono" required placeholder="black-friday" value="{{if .Campaign}}{{.Campaign.Slug}}{{end}}">
      </div>
      <div>
        <label class="form-label">کد تخفیف</label>
        <input type="text" name="discount_code" class="form-input font-mono" placeholder="SAVE30" value="{{if .Campaign}}{{.Campaign.DiscountCode}}{{end}}">
      </div>
    </div>
    <div>
      <label class="form-label">عنوان *</label>
      <input type="text" name="title" class="form-input" required value="{{if .Campaign}}{{.Campaign.Title}}{{end}}">
    </div>
    <div>
      <label class="form-label">زیرعنوان</label>
      <input type="text" name="subtitle" class="form-input" value="{{if .Campaign}}{{.Campaign.Subtitle}}{{end}}">
    </div>
    <div>
      <label class="form-label">توضیحات</label>
      <textarea name="description" class="form-input" rows="4">{{if .Campaign}}{{.Campaign.Description}}{{end}}</textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">درصد تخفیف</label>
        <input type="number" name="discount_percent" class="form-input" min="0" max="100" value="{{if .Campaign}}{{.Campaign.DiscountPercent}}{{else}}0{{end}}">
      </div>
      <div>
        <label class="form-label">پایان کمپین (شمارش معکوس)</label>
        <input type="datetime-local" name="countdown_at" class="form-input" value="{{if .Campaign}}{{.Campaign.CountdownAt}}{{end}}">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">متن دکمه CTA</label>
        <input type="text" name="cta_text" class="form-input" placeholder="همین الان خرید کن" value="{{if .Campaign}}{{.Campaign.CTAText}}{{end}}">
      </div>
      <div>
        <label class="form-label">تصویر (URL یا مسیر)</label>
        <input type="text" name="image" class="form-input" value="{{if .Campaign}}{{.Campaign.Image}}{{end}}">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">عنوان متا (SEO)</label>
        <input type="text" name="meta_title" class="form-input" value="{{if .Campaign}}{{.Campaign.MetaTitle}}{{end}}">
      </div>
      <div>
        <label class="form-label">توضیح متا (SEO)</label>
        <input type="text" name="meta_description" class="form-input" value="{{if .Campaign}}{{.Campaign.MetaDescription}}{{end}}">
      </div>
    </div>
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="is_active" value="1" {{if not .Campaign}}checked{{else if .Campaign.IsActive}}checked{{end}}> فعال
    </label>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
</div>
{{end}}
