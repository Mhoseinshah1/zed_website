{{define "admin-content"}}
<div class="mb-6"><a href="/zed-admin/locations" class="text-gray-400 hover:text-white text-sm flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>بازگشت</a></div>
{{if .Error}}<div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl p-4 mb-6 text-sm">{{.Error}}</div>{{end}}
<form method="POST" action="/zed-admin/locations/save" class="admin-card p-6 space-y-5">
  <input type="hidden" name="id" value="{{if .Location}}{{.Location.ID}}{{end}}">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <div>
      <label class="form-label">نام کشور *</label>
      <input type="text" name="name" required value="{{if .Location}}{{.Location.Name}}{{end}}" class="form-input" placeholder="مثال: آلمان">
    </div>
    <div>
      <label class="form-label">پرچم (اموجی) *</label>
      <input type="text" name="flag" required value="{{if .Location}}{{.Location.Flag}}{{end}}" class="form-input" placeholder="مثال: 🇩🇪">
    </div>
    <div>
      <label class="form-label">کد کشور</label>
      <input type="text" name="code" value="{{if .Location}}{{.Location.Code}}{{end}}" class="form-input" dir="ltr" placeholder="مثال: DE">
    </div>
    <div>
      <label class="form-label">سرعت</label>
      <input type="text" name="speed" value="{{if .Location}}{{.Location.Speed}}{{else}}۱ گیگابیت{{end}}" class="form-input">
    </div>
    <div>
      <label class="form-label">ترتیب</label>
      <input type="number" name="sort_order" value="{{if .Location}}{{.Location.SortOrder}}{{else}}0{{end}}" class="form-input">
    </div>
    <div class="flex items-end pb-1">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="is_active" value="1" {{if .Location}}{{if .Location.IsActive}}checked{{end}}{{else}}checked{{end}}>
        <span class="text-sm text-gray-300">فعال</span>
      </label>
    </div>
  </div>
  <div class="flex gap-3">
    <button type="submit" class="btn-save px-8 py-2.5">ذخیره</button>
    <a href="/zed-admin/locations" class="px-6 py-2.5 rounded-lg text-gray-400 text-sm font-medium border border-white/10">انصراف</a>
  </div>
</form>
{{end}}
