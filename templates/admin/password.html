{{define "admin-content"}}
<div class="max-w-md">
  {{if .Error}}<div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl p-4 mb-6 text-sm">{{.Error}}</div>{{end}}
  {{if .Success}}<div class="bg-green-500/10 border border-green-500/30 text-green-400 rounded-xl p-4 mb-6 text-sm">{{.Success}}</div>{{end}}

  <form method="POST" action="/zed-admin/password" class="admin-card p-6 space-y-5">
    <div>
      <label class="form-label">رمز عبور فعلی</label>
      <input type="password" name="current_password" required class="form-input">
    </div>
    <div>
      <label class="form-label">رمز عبور جدید</label>
      <input type="password" name="new_password" required minlength="8" class="form-input">
      <p class="text-xs text-gray-500 mt-1">حداقل ۸ کاراکتر</p>
    </div>
    <div>
      <label class="form-label">تکرار رمز عبور جدید</label>
      <input type="password" name="confirm_password" required class="form-input">
    </div>
    <button type="submit" class="btn-save px-8 py-2.5">تغییر رمز عبور</button>
  </form>
</div>
{{end}}
