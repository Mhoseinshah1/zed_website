{{define "admin-content"}}
<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-bold text-white">صفحات فرود SEO</h1>
    <a href="/zed-admin/landing-pages/new" class="btn-save text-sm">+ صفحه جدید</a>
  </div>
  <div class="admin-card">
    <div class="overflow-x-auto">
      <table class="data-table">
        <thead><tr><th>اسلاگ</th><th>عنوان</th><th>کلمات کلیدی</th><th>وضعیت</th><th>عملیات</th></tr></thead>
        <tbody>
          {{range .Pages}}
          <tr>
            <td><a href="/l/{{.Slug}}" target="_blank" class="text-indigo-400 hover:underline font-mono text-sm">{{.Slug}}</a></td>
            <td class="text-white font-medium">{{.Title}}</td>
            <td class="text-gray-400 text-sm max-w-xs truncate">{{.Keywords}}</td>
            <td>{{if .IsActive}}<span class="badge badge-green">فعال</span>{{else}}<span class="badge badge-red">غیرفعال</span>{{end}}</td>
            <td class="flex gap-2">
              <a href="/zed-admin/landing-pages/{{.ID}}/edit" class="btn-edit">ویرایش</a>
              <form method="POST" action="/zed-admin/landing-pages/{{.ID}}/delete" onsubmit="return confirm('حذف شود؟')">
                <button class="btn-danger">حذف</button>
              </form>
            </td>
          </tr>
          {{else}}
          <tr><td colspan="5" class="text-center text-gray-500 py-8">هیچ صفحه‌ای ثبت نشده</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>
</div>
{{end}}
