{{define "admin-content"}}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="/zed-admin/discount-codes" class="text-gray-400 hover:text-white">← برگشت</a>
    <h1 class="text-xl font-bold text-white">{{.Title}}</h1>
  </div>
  {{if .Error}}<div class="bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-xl mb-4">{{.Error}}</div>{{end}}
  <form method="POST" action="/zed-admin/discount-codes/save" class="admin-card p-6 space-y-5">
    {{if .Code}}<input type="hidden" name="id" value="{{.Code.ID}}">{{end}}
    <div>
      <label class="form-label">کد تخفیف *</label>
      <input type="text" name="code" class="form-input font-mono uppercase" placeholder="ZED30" required value="{{if .Code}}{{.Code.Code}}{{end}}">
    </div>
    <div>
      <label class="form-label">توضیح</label>
      <input type="text" name="description" class="form-input" placeholder="۳۰٪ تخفیف برای همه پلن‌ها" value="{{if .Code}}{{.Code.Description}}{{end}}">
    </div>
    <div>
      <label class="form-label">درصد تخفیف</label>
      <input type="number" name="discount_percent" class="form-input" min="0" max="100" value="{{if .Code}}{{.Code.DiscountPercent}}{{else}}0{{end}}">
    </div>
    <div>
      <label class="form-label">تاریخ انقضا (اختیاری)</label>
      <input type="datetime-local" name="expires_at" class="form-input" value="{{if .Code}}{{if .Code.ExpiresAt.Valid}}{{.Code.ExpiresAt.Time.Format "2006-01-02T15:04"}}{{end}}{{end}}">
    </div>
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="is_active" value="1" class="rounded" {{if not .Code}}checked{{else if .Code.IsActive}}checked{{end}}> فعال
    </label>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
</div>
{{end}}
