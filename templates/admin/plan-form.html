{{define "admin-content"}}
<div class="mb-6">
  <a href="/zed-admin/plans" class="text-gray-400 hover:text-white text-sm flex items-center gap-1">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    بازگشت به پلن‌ها
  </a>
</div>

{{if .Error}}<div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl p-4 mb-6 text-sm">{{.Error}}</div>{{end}}

<form method="POST" action="/zed-admin/plans/save" class="admin-card p-6 space-y-5">
  <input type="hidden" name="id" value="{{if .Plan}}{{.Plan.ID}}{{end}}">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <div>
      <label class="form-label">نام پلن *</label>
      <input type="text" name="name" required value="{{if .Plan}}{{.Plan.Name}}{{end}}" class="form-input" placeholder="مثال: طلا">
    </div>
    <div>
      <label class="form-label">ترافیک *</label>
      <input type="text" name="traffic" required value="{{if .Plan}}{{.Plan.Traffic}}{{end}}" class="form-input" placeholder="مثال: ۱۵۰ گیگابایت">
    </div>
    <div>
      <label class="form-label">مدت اشتراک *</label>
      <input type="text" name="duration" required value="{{if .Plan}}{{.Plan.Duration}}{{end}}" class="form-input" placeholder="مثال: ۱ ماه">
    </div>
    <div>
      <label class="form-label">قیمت *</label>
      <input type="text" name="price" required value="{{if .Plan}}{{.Plan.Price}}{{end}}" class="form-input" placeholder="مثال: ۱۴۵,۰۰۰ تومان">
    </div>
    <div>
      <label class="form-label">بج (اختیاری)</label>
      <input type="text" name="badge" value="{{if .Plan}}{{.Plan.Badge}}{{end}}" class="form-input" placeholder="مثال: پیشنهادی، VIP">
    </div>
    <div>
      <label class="form-label">ترتیب نمایش</label>
      <input type="number" name="sort_order" value="{{if .Plan}}{{.Plan.SortOrder}}{{else}}0{{end}}" class="form-input">
    </div>
  </div>

  <div>
    <label class="form-label">توضیحات کوتاه</label>
    <input type="text" name="description" value="{{if .Plan}}{{.Plan.Description}}{{end}}" class="form-input" placeholder="توضیح کوتاه درباره این پلن">
  </div>

  <div>
    <label class="form-label">ویژگی‌ها (هر خط یک ویژگی)</label>
    <textarea name="features" class="form-input" rows="6" placeholder="سرعت تا ۱ گیگابیت&#10;پشتیبانی ۲۴/۷&#10;چند دستگاه همزمان">{{.FeaturesText}}</textarea>
    <p class="text-xs text-gray-500 mt-1">هر ویژگی را در یک خط جداگانه بنویسید</p>
  </div>

  <div class="flex items-center gap-8">
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="is_popular" value="1" {{if .Plan}}{{if .Plan.IsPopular}}checked{{end}}{{end}} class="w-4 h-4 rounded">
      <span class="text-sm text-gray-300">پرفروش‌ترین</span>
    </label>
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="is_active" value="1" {{if .Plan}}{{if .Plan.IsActive}}checked{{end}}{{else}}checked{{end}} class="w-4 h-4 rounded">
      <span class="text-sm text-gray-300">فعال</span>
    </label>
  </div>

  <div class="flex gap-3 pt-2">
    <button type="submit" class="btn-save px-8 py-2.5">ذخیره پلن</button>
    <a href="/zed-admin/plans" class="px-6 py-2.5 rounded-lg text-gray-400 hover:text-white text-sm font-medium border border-white/10 hover:border-white/20 transition-colors">انصراف</a>
  </div>
</form>
{{end}}
