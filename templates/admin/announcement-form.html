{{define "admin-content"}}
<div class="max-w-2xl">
  <div class="flex items-center gap-3 mb-6">
    <a href="/zed-admin/announcements" class="text-gray-400 hover:text-white">← برگشت</a>
    <h1 class="text-xl font-bold text-white">{{.Title}}</h1>
  </div>
  {{if .Error}}<div class="bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-xl mb-4">{{.Error}}</div>{{end}}
  <form method="POST" action="/zed-admin/announcements/save" class="admin-card p-6 space-y-5">
    {{if .Announcement}}<input type="hidden" name="id" value="{{.Announcement.ID}}">{{end}}
    <div>
      <label class="form-label">پیام *</label>
      <textarea name="message" class="form-input" rows="2" required>{{if .Announcement}}{{.Announcement.Message}}{{end}}</textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">رنگ</label>
        <select name="color" class="form-input">
          {{$c := ""}}{{if .Announcement}}{{$c = .Announcement.Color}}{{end}}
          <option value="blue" {{if eq $c "blue"}}selected{{end}}>آبی</option>
          <option value="green" {{if eq $c "green"}}selected{{end}}>سبز</option>
          <option value="yellow" {{if eq $c "yellow"}}selected{{end}}>زرد</option>
          <option value="red" {{if eq $c "red"}}selected{{end}}>قرمز</option>
          <option value="purple" {{if eq $c "purple"}}selected{{end}}>بنفش</option>
        </select>
      </div>
      <div>
        <label class="form-label">ترتیب نمایش</label>
        <input type="number" name="sort_order" class="form-input" value="{{if .Announcement}}{{.Announcement.SortOrder}}{{else}}0{{end}}">
      </div>
    </div>
    <div>
      <label class="form-label">صفحات هدف (all یا نام صفحه مثل home,plans)</label>
      <input type="text" name="target_pages" class="form-input" value="{{if .Announcement}}{{.Announcement.TargetPages}}{{else}}all{{end}}">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">شروع نمایش (اختیاری)</label>
        <input type="datetime-local" name="start_at" class="form-input" value="{{if .Announcement}}{{if .Announcement.StartAt.Valid}}{{.Announcement.StartAt.Time.Format "2006-01-02T15:04"}}{{end}}{{end}}">
      </div>
      <div>
        <label class="form-label">پایان نمایش (اختیاری)</label>
        <input type="datetime-local" name="end_at" class="form-input" value="{{if .Announcement}}{{if .Announcement.EndAt.Valid}}{{.Announcement.EndAt.Time.Format "2006-01-02T15:04"}}{{end}}{{end}}">
      </div>
    </div>
    <div class="flex gap-6">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="is_active" value="1" class="rounded" {{if not .Announcement}}checked{{else if .Announcement.IsActive}}checked{{end}}> فعال
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="is_closable" value="1" class="rounded" {{if not .Announcement}}checked{{else if .Announcement.IsClosable}}checked{{end}}> قابل بستن
      </label>
    </div>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
</div>
{{end}}
