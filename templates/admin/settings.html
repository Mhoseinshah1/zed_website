{{define "admin-content"}}
<form method="POST" action="/zed-admin/settings" class="space-y-6">
  {{if .Saved}}<div class="bg-green-500/10 border border-green-500/30 text-green-400 rounded-xl p-4 text-sm">تنظیمات با موفقیت ذخیره شد</div>{{end}}

  <!-- Brand -->
  <div class="admin-card p-6">
    <h2 class="text-white font-bold text-base mb-5 pb-3 border-b border-white/10">اطلاعات برند</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label class="form-label">نام سایت</label>
        <input type="text" name="site_name" value="{{index .Settings "site_name"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">شعار سایت</label>
        <input type="text" name="site_tagline" value="{{index .Settings "site_tagline"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">آدرس سایت (URL)</label>
        <input type="url" name="site_url" value="{{index .Settings "site_url"}}" class="form-input" dir="ltr">
      </div>
      <div>
        <label class="form-label">متن لوگو</label>
        <input type="text" name="logo_text" value="{{index .Settings "logo_text"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">متن فوتر</label>
        <input type="text" name="footer_text" value="{{index .Settings "footer_text"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">لوگو (مسیر فایل یا URL)</label>
        <input type="text" name="logo_image" value="{{index .Settings "logo_image"}}" class="form-input" dir="ltr" placeholder="/uploads/logo.png">
      </div>
      <div>
        <label class="form-label">فاوآیکون (مسیر فایل یا URL)</label>
        <input type="text" name="favicon" value="{{index .Settings "favicon"}}" class="form-input" dir="ltr" placeholder="/uploads/favicon.ico">
      </div>
      <div>
        <label class="form-label">تصویر OG (Open Graph)</label>
        <input type="text" name="og_image" value="{{index .Settings "og_image"}}" class="form-input" dir="ltr" placeholder="/uploads/og.jpg">
      </div>
    </div>
  </div>

  <!-- Hero -->
  <div class="admin-card p-6">
    <h2 class="text-white font-bold text-base mb-5 pb-3 border-b border-white/10">بخش Hero (صفحه اول)</h2>
    <div class="grid grid-cols-1 gap-5">
      <div>
        <label class="form-label">عنوان اصلی Hero</label>
        <input type="text" name="hero_title" value="{{index .Settings "hero_title"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">زیرعنوان Hero</label>
        <textarea name="hero_subtitle" class="form-input" rows="3">{{index .Settings "hero_subtitle"}}</textarea>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="form-label">متن دکمه اصلی CTA</label>
          <input type="text" name="hero_cta_text" value="{{index .Settings "hero_cta_text"}}" class="form-input">
        </div>
        <div>
          <label class="form-label">متن دکمه ثانویه</label>
          <input type="text" name="hero_secondary" value="{{index .Settings "hero_secondary"}}" class="form-input">
        </div>
      </div>
    </div>
  </div>

  <!-- Telegram -->
  <div class="admin-card p-6">
    <h2 class="text-white font-bold text-base mb-5 pb-3 border-b border-white/10">لینک‌های تلگرام</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
      <div>
        <label class="form-label">ربات خرید</label>
        <input type="url" name="telegram_bot" value="{{index .Settings "telegram_bot"}}" class="form-input" dir="ltr">
      </div>
      <div>
        <label class="form-label">کانال تلگرام</label>
        <input type="url" name="telegram_channel" value="{{index .Settings "telegram_channel"}}" class="form-input" dir="ltr">
      </div>
      <div>
        <label class="form-label">پشتیبانی</label>
        <input type="url" name="telegram_support" value="{{index .Settings "telegram_support"}}" class="form-input" dir="ltr">
      </div>
    </div>
  </div>

  <!-- SEO -->
  <div class="admin-card p-6">
    <h2 class="text-white font-bold text-base mb-5 pb-3 border-b border-white/10">تنظیمات SEO</h2>
    <div class="grid grid-cols-1 gap-5">
      <div>
        <label class="form-label">عنوان SEO صفحه اصلی</label>
        <input type="text" name="seo_title" value="{{index .Settings "seo_title"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">توضیح SEO صفحه اصلی</label>
        <textarea name="seo_description" class="form-input" rows="3">{{index .Settings "seo_description"}}</textarea>
      </div>
    </div>
  </div>

  <!-- Trust Numbers -->
  <div class="admin-card p-6">
    <h2 class="text-white font-bold text-base mb-5 pb-3 border-b border-white/10">اعداد اعتمادسازی</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
      <div>
        <label class="form-label">تعداد کاربران</label>
        <input type="text" name="trust_count_users" value="{{index .Settings "trust_count_users"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">آپتایم</label>
        <input type="text" name="trust_uptime" value="{{index .Settings "trust_uptime"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">سرعت</label>
        <input type="text" name="trust_speed" value="{{index .Settings "trust_speed"}}" class="form-input">
      </div>
      <div>
        <label class="form-label">پشتیبانی</label>
        <input type="text" name="trust_support" value="{{index .Settings "trust_support"}}" class="form-input">
      </div>
    </div>
  </div>

  <!-- Analytics & Custom CSS -->
  <div class="admin-card p-6">
    <h2 class="text-white font-bold text-base mb-5 pb-3 border-b border-white/10">پیشرفته</h2>
    <div class="grid grid-cols-1 gap-5">
      <div>
        <label class="form-label">Google Analytics ID</label>
        <input type="text" name="google_analytics" value="{{index .Settings "google_analytics"}}" class="form-input" dir="ltr" placeholder="G-XXXXXXXXXX">
      </div>
      <div>
        <label class="form-label">Google Search Console Verification</label>
        <input type="text" name="gsc_verification" value="{{index .Settings "gsc_verification"}}" class="form-input" dir="ltr" placeholder="google-site-verification=...">
      </div>
      <div>
        <label class="form-label">CSS سفارشی</label>
        <textarea name="custom_css" class="form-input font-mono text-sm" rows="5" dir="ltr" placeholder="/* CSS سفارشی شما */">{{index .Settings "custom_css"}}</textarea>
      </div>
      <div>
        <label class="form-label">JavaScript سفارشی</label>
        <textarea name="custom_js" class="form-input font-mono text-sm" rows="4" dir="ltr" placeholder="// JS سفارشی شما">{{index .Settings "custom_js"}}</textarea>
      </div>
      <div>
        <label class="form-label">اضافه‌کردن به robots.txt</label>
        <textarea name="robots_txt_extra" class="form-input font-mono text-sm" rows="3" dir="ltr" placeholder="Disallow: /private/">{{index .Settings "robots_txt_extra"}}</textarea>
      </div>
      <div>
        <label class="form-label">پیام حالت تعمیر</label>
        <input type="text" name="maintenance_msg" value="{{index .Settings "maintenance_msg"}}" class="form-input" placeholder="سایت در حال بروزرسانی است. به زودی برمی‌گردیم.">
      </div>
    </div>
  </div>

  <div class="flex justify-end">
    <button type="submit" class="btn-save px-8 py-3 text-base">ذخیره تنظیمات</button>
  </div>
</form>
{{end}}
