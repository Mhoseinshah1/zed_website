{{define "admin-content"}}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="/zed-admin/status-items" class="text-gray-400 hover:text-white">← برگشت</a>
    <h1 class="text-xl font-bold text-white">{{.Title}}</h1>
  </div>
  {{if .Error}}<div class="bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-xl mb-4">{{.Error}}</div>{{end}}
  <form method="POST" action="/zed-admin/status-items/save" class="admin-card p-6 space-y-5">
    {{if .Item}}<input type="hidden" name="id" value="{{.Item.ID}}">{{end}}
    <div>
      <label class="form-label">نام سرویس *</label>
      <input type="text" name="name" class="form-input" required value="{{if .Item}}{{.Item.Name}}{{end}}">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">نوع سرویس</label>
        <select name="service_type" class="form-input">
          {{$t := ""}}{{if .Item}}{{$t = .Item.ServiceType}}{{end}}
          <option value="server" {{if eq $t "server"}}selected{{end}}>سرور</option>
          <option value="service" {{if eq $t "service"}}selected{{end}}>سرویس</option>
          <option value="bot" {{if eq $t "bot"}}selected{{end}}>ربات</option>
          <option value="support" {{if eq $t "support"}}selected{{end}}>پشتیبانی</option>
          <option value="payment" {{if eq $t "payment"}}selected{{end}}>پرداخت</option>
          <option value="general" {{if eq $t "general"}}selected{{end}}>عمومی</option>
        </select>
      </div>
      <div>
        <label class="form-label">وضعیت</label>
        <select name="status" class="form-input">
          {{$s := ""}}{{if .Item}}{{$s = .Item.Status}}{{end}}
          <option value="operational" {{if eq $s "operational"}}selected{{end}}>عملیاتی ✅</option>
          <option value="partial_outage" {{if eq $s "partial_outage"}}selected{{end}}>اختلال جزئی ⚠️</option>
          <option value="maintenance" {{if eq $s "maintenance"}}selected{{end}}>تعمیر 🔧</option>
          <option value="offline" {{if eq $s "offline"}}selected{{end}}>آفلاین ❌</option>
        </select>
      </div>
    </div>
    <div>
      <label class="form-label">توضیح</label>
      <input type="text" name="description" class="form-input" value="{{if .Item}}{{.Item.Description}}{{end}}">
    </div>
    <div>
      <label class="form-label">ترتیب</label>
      <input type="number" name="sort_order" class="form-input" value="{{if .Item}}{{.Item.SortOrder}}{{else}}0{{end}}">
    </div>
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="is_active" value="1" {{if not .Item}}checked{{else if .Item.IsActive}}checked{{end}}> فعال
    </label>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
</div>
{{end}}
