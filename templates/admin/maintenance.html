{{define "admin-content"}}
<div class="max-w-lg">
  <h1 class="text-xl font-bold text-white mb-6">حالت تعمیر و نگهداری</h1>
  {{if .Message}}<div class="bg-green-500/20 border border-green-500/30 text-green-300 p-4 rounded-xl mb-4">{{.Message}}</div>{{end}}
  <form method="POST" action="/zed-admin/maintenance/save" class="admin-card p-6 space-y-5">
    <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl">
      <div>
        <p class="text-white font-medium">حالت تعمیر</p>
        <p class="text-gray-400 text-sm mt-1">وقتی فعال باشد، کاربران صفحه تعمیر می‌بینند. ادمین‌ها همچنان دسترسی دارند.</p>
      </div>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" name="maintenance_mode" value="1" {{if eq .MaintenanceMode "1"}}checked{{end}} class="sr-only peer">
        <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
      </label>
    </div>
    <div>
      <label class="form-label">پیام نمایش داده شده به کاربران</label>
      <textarea name="maintenance_msg" class="form-input" rows="3" placeholder="سایت در حال بروزرسانی است. به زودی برمی‌گردیم.">{{.MaintenanceMsg}}</textarea>
    </div>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
  {{if eq .MaintenanceMode "1"}}
  <div class="mt-4 bg-yellow-500/20 border border-yellow-500/30 text-yellow-300 p-4 rounded-xl text-sm">
    ⚠️ حالت تعمیر <strong>فعال</strong> است. کاربران سایت را نمی‌بینند.
  </div>
  {{end}}
</div>
{{end}}
