{{define "admin-content"}}
<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-bold text-white">جدول مقایسه پلن‌ها</h1>
    <a href="/zed-admin/plan-comparison/new" class="btn-save text-sm">+ ردیف جدید</a>
  </div>
  <div class="admin-card">
    <div class="overflow-x-auto">
      <table class="data-table">
        <thead><tr><th>ویژگی</th><th>برنز</th><th>نقره</th><th>طلا</th><th>پلاتینیوم</th><th>عملیات</th></tr></thead>
        <tbody>
          {{range .Comparisons}}
          <tr>
            <td class="text-white font-medium">{{.FeatureName}}</td>
            <td class="text-gray-300 text-sm">{{.BronzeValue}}</td>
            <td class="text-gray-300 text-sm">{{.SilverValue}}</td>
            <td class="text-gray-300 text-sm">{{.GoldValue}}</td>
            <td class="text-gray-300 text-sm">{{.PlatinumValue}}</td>
            <td class="flex gap-2">
              <a href="/zed-admin/plan-comparison/{{.ID}}/edit" class="btn-edit">ویرایش</a>
              <form method="POST" action="/zed-admin/plan-comparison/{{.ID}}/delete" onsubmit="return confirm('حذف شود؟')">
                <button class="btn-danger">حذف</button>
              </form>
            </td>
          </tr>
          {{else}}
          <tr><td colspan="6" class="text-center text-gray-500 py-8">هیچ ردیفی ثبت نشده</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>
</div>
{{end}}
