{{define "admin-content"}}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="/zed-admin/popups" class="text-gray-400 hover:text-white">← برگشت</a>
    <h1 class="text-xl font-bold text-white">{{.Title}}</h1>
  </div>
  {{if .Error}}<div class="bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-xl mb-4">{{.Error}}</div>{{end}}
  <form method="POST" action="/zed-admin/popups/save" class="admin-card p-6 space-y-5">
    {{if .Popup}}<input type="hidden" name="id" value="{{.Popup.ID}}">{{end}}
    <div>
      <label class="form-label">عنوان *</label>
      <input type="text" name="title" class="form-input" required value="{{if .Popup}}{{.Popup.Title}}{{end}}">
    </div>
    <div>
      <label class="form-label">متن بدنه</label>
      <textarea name="body" class="form-input" rows="3">{{if .Popup}}{{.Popup.Body}}{{end}}</textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">متن دکمه CTA</label>
        <input type="text" name="cta_text" class="form-input" placeholder="خرید کن" value="{{if .Popup}}{{.Popup.CTAText}}{{end}}">
      </div>
      <div>
        <label class="form-label">لینک دکمه CTA</label>
        <input type="text" name="cta_url" class="form-input" value="{{if .Popup}}{{.Popup.CTAUrl}}{{end}}">
      </div>
    </div>
    <div>
      <label class="form-label">تاخیر نمایش (ثانیه)</label>
      <input type="number" name="delay_seconds" class="form-input" min="0" value="{{if .Popup}}{{.Popup.DelaySeconds}}{{else}}5{{end}}">
    </div>
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="exit_intent" value="1" {{if .Popup}}{{if .Popup.ExitIntent}}checked{{end}}{{end}}> Exit Intent (نمایش هنگام خروج)
    </label>
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="is_active" value="1" {{if not .Popup}}checked{{else if .Popup.IsActive}}checked{{end}}> فعال
    </label>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
</div>
{{end}}
