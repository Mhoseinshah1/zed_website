{{define "admin-content"}}
<div class="max-w-2xl">
  <div class="flex items-center gap-3 mb-6">
    <a href="/zed-admin/landing-pages" class="text-gray-400 hover:text-white">← برگشت</a>
    <h1 class="text-xl font-bold text-white">{{.Title}}</h1>
  </div>
  {{if .Error}}<div class="bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-xl mb-4">{{.Error}}</div>{{end}}
  <form method="POST" action="/zed-admin/landing-pages/save" class="admin-card p-6 space-y-5">
    {{if .Page}}<input type="hidden" name="id" value="{{.Page.ID}}">{{end}}
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">اسلاگ (URL) *</label>
        <input type="text" name="slug" class="form-input font-mono" required placeholder="vpn-for-iran" value="{{if .Page}}{{.Page.Slug}}{{end}}">
      </div>
      <div>
        <label class="form-label">عنوان H1 *</label>
        <input type="text" name="h1" class="form-input" required value="{{if .Page}}{{.Page.H1}}{{end}}">
      </div>
    </div>
    <div>
      <label class="form-label">عنوان صفحه (Title Tag) *</label>
      <input type="text" name="title" class="form-input" required value="{{if .Page}}{{.Page.Title}}{{end}}">
    </div>
    <div>
      <label class="form-label">توضیح متا</label>
      <input type="text" name="meta_description" class="form-input" value="{{if .Page}}{{.Page.MetaDescription}}{{end}}">
    </div>
    <div>
      <label class="form-label">کلمات کلیدی (جدا شده با کاما)</label>
      <input type="text" name="keywords" class="form-input" placeholder="vpn ایران, فیلترشکن, پروکسی" value="{{if .Page}}{{.Page.Keywords}}{{end}}">
    </div>
    <div>
      <label class="form-label">محتوای اصلی (HTML مجاز)</label>
      <textarea name="body" class="form-input font-mono text-sm" rows="10">{{if .Page}}{{.Page.Body}}{{end}}</textarea>
    </div>
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="is_active" value="1" {{if not .Page}}checked{{else if .Page.IsActive}}checked{{end}}> فعال (ایندکس در گوگل)
    </label>
    <button type="submit" class="btn-save">ذخیره</button>
  </form>
</div>
{{end}}
