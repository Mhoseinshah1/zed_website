{{define "admin-content"}}
<div class="space-y-6 max-w-3xl" dir="rtl">
  <h1 class="text-xl font-bold" style="color:var(--admin-text)">تنظیمات ایمیل (SMTP)</h1>

  <form method="POST" action="/zed-admin/settings/email" class="space-y-5">
    <!-- SMTP Connection -->
    <div class="admin-card p-5 space-y-4">
      <h2 class="text-sm font-semibold pb-2" style="color:var(--admin-muted);border-bottom:1px solid var(--admin-border)">⚙️ اتصال SMTP</h2>

      <label class="flex items-center justify-between cursor-pointer py-1">
        <span class="text-sm" style="color:var(--admin-text)">فعال‌کردن ارسال ایمیل</span>
        <input type="hidden" name="smtp_enabled" value="0">
        <input type="checkbox" name="smtp_enabled" value="1" {{if eq .S.smtp_enabled "1"}}checked{{end}}
               class="w-4 h-4 rounded" style="accent-color:var(--admin-accent)">
      </label>

      <div class="grid md:grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="form-label text-xs">آدرس سرور SMTP</label>
          <input type="text" name="smtp_host" value="{{.S.smtp_host}}" placeholder="smtp.gmail.com" class="form-input">
        </div>
        <div class="space-y-1">
          <label class="form-label text-xs">پورت</label>
          <input type="number" name="smtp_port" value="{{if .S.smtp_port}}{{.S.smtp_port}}{{else}}587{{end}}" placeholder="587" class="form-input">
        </div>
        <div class="space-y-1">
          <label class="form-label text-xs">نام کاربری (ایمیل)</label>
          <input type="text" name="smtp_username" value="{{.S.smtp_username}}" placeholder="noreply@example.com" class="form-input">
        </div>
        <div class="space-y-1">
          <label class="form-label text-xs">رمز عبور SMTP</label>
          <div class="relative">
            <input type="password" name="smtp_password" id="smtp-pw" autocomplete="new-password"
                   placeholder="{{if .S.smtp_password_set}}••••••••  — برای تغییر وارد کنید{{else}}رمز عبور یا App Password{{end}}"
                   class="form-input" style="padding-left:2.5rem">
            <button type="button" onclick="toggleSmtpPw()" aria-label="نمایش رمز عبور"
                    style="position:absolute;left:0.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b">
              <svg id="smtp-eye-show" style="width:1.1rem;height:1.1rem" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg id="smtp-eye-hide" style="width:1.1rem;height:1.1rem;display:none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
          <p class="text-xs" style="color:var(--admin-muted)">پس از ذخیره مخفی می‌شود. خالی بگذارید تا تغییر نکند.</p>
        </div>
      </div>

      <label class="flex items-center justify-between cursor-pointer py-1">
        <span class="text-sm" style="color:var(--admin-text)">استفاده از TLS/STARTTLS</span>
        <input type="hidden" name="smtp_use_tls" value="0">
        <input type="checkbox" name="smtp_use_tls" value="1" {{if ne .S.smtp_use_tls "0"}}checked{{end}}
               class="w-4 h-4 rounded" style="accent-color:var(--admin-accent)">
      </label>
    </div>

    <!-- Sender info -->
    <div class="admin-card p-5 space-y-4">
      <h2 class="text-sm font-semibold pb-2" style="color:var(--admin-muted);border-bottom:1px solid var(--admin-border)">📧 اطلاعات فرستنده</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="form-label text-xs">ایمیل فرستنده</label>
          <input type="text" name="smtp_from_email" value="{{.S.smtp_from_email}}" placeholder="noreply@example.com" class="form-input">
        </div>
        <div class="space-y-1">
          <label class="form-label text-xs">نام فرستنده</label>
          <input type="text" name="smtp_from_name" value="{{.S.smtp_from_name}}" placeholder="ZedProxy" class="form-input">
        </div>
      </div>
    </div>

    <!-- Verification settings -->
    <div class="admin-card p-5 space-y-4">
      <h2 class="text-sm font-semibold pb-2" style="color:var(--admin-muted);border-bottom:1px solid var(--admin-border)">🔒 تنظیمات تأیید ایمیل</h2>
      <div class="grid md:grid-cols-3 gap-4">
        <div class="space-y-1">
          <label class="form-label text-xs">اعتبار کد (دقیقه)</label>
          <input type="number" name="email_verification_code_ttl_minutes" min="1" max="60"
                 value="{{if .S.email_verification_code_ttl_minutes}}{{.S.email_verification_code_ttl_minutes}}{{else}}5{{end}}"
                 class="form-input">
        </div>
        <div class="space-y-1">
          <label class="form-label text-xs">تاخیر ارسال مجدد (ثانیه)</label>
          <input type="number" name="email_verification_resend_cooldown_seconds" min="30" max="600"
                 value="{{if .S.email_verification_resend_cooldown_seconds}}{{.S.email_verification_resend_cooldown_seconds}}{{else}}60{{end}}"
                 class="form-input">
        </div>
        <div class="space-y-1">
          <label class="form-label text-xs">حداکثر تلاش</label>
          <input type="number" name="email_verification_max_attempts" min="3" max="10"
                 value="{{if .S.email_verification_max_attempts}}{{.S.email_verification_max_attempts}}{{else}}5{{end}}"
                 class="form-input">
        </div>
      </div>
    </div>

    <div class="flex gap-3">
      <button type="submit" class="btn-save">ذخیره تنظیمات</button>
    </div>
  </form>

  <!-- Test email -->
  <div class="admin-card p-5">
    <h2 class="text-sm font-semibold pb-2 mb-4" style="color:var(--admin-muted);border-bottom:1px solid var(--admin-border)">📨 ارسال ایمیل تست</h2>
    <form method="POST" action="/zed-admin/settings/email/test" class="flex gap-3 items-end">
      <div class="flex-1 space-y-1">
        <label class="form-label text-xs">آدرس ایمیل</label>
        <input type="email" name="test_email" placeholder="test@example.com" class="form-input" required>
      </div>
      <button type="submit" class="btn-save whitespace-nowrap">ارسال تست</button>
    </form>
    {{if .TestResult}}
    <div class="mt-3 px-3 py-2 rounded-lg text-sm {{if .TestOK}}text-green-400{{else}}text-red-400{{end}}"
         style="background:var(--admin-hover)">{{.TestResult}}</div>
    {{end}}
  </div>
</div>
<script>
function toggleSmtpPw() {
  var inp = document.getElementById('smtp-pw');
  var show = document.getElementById('smtp-eye-show');
  var hide = document.getElementById('smtp-eye-hide');
  if (inp.type === 'password') {
    inp.type = 'text';
    show.style.display = 'none';
    hide.style.display = '';
  } else {
    inp.type = 'password';
    show.style.display = '';
    hide.style.display = 'none';
  }
}
</script>
{{end}}
